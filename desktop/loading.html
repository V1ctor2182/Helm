<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Helm</title>
    <style>
      html,
      body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        font: 16px -apple-system, system-ui, sans-serif;
        color: #555; background: #fafafa;
      }
      .dot {
        width: 8px; height: 8px; margin: 0 auto 12px; border-radius: 50%;
        background: #888; animation: pulse 1.1s ease-in-out infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <div style="text-align: center">
      <div class="dot"></div>
      starting Helm…
    </div>
  </body>
</html>
