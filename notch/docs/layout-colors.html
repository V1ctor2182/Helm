<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Helm Notch — 配色方案对比</title>
<style>
  :root{
    --green:#34C759;--orange:#FF9F0A;--red:#FF453A;
    --hair:rgba(255,255,255,.08);
    --t1:#fff;--t2:rgba(255,255,255,.56);--t3:rgba(255,255,255,.36);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1200px 700px at 50% -10%,#2a2438,#14121c 45%,#0a0910 100%);
    min-height:100vh;color:var(--t1);padding:44px 24px 90px}
  h1{font-size:16px;font-weight:600;color:var(--t2);text-align:center}
  .sub{font-size:12px;color:var(--t3);text-align:center;margin:6px auto 30px;max-width:680px;line-height:1.6}
  .sub b{color:var(--t2)}
  .gridwrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:26px;max-width:1080px;margin:0 auto}
  .scheme{display:flex;flex-direction:column;align-items:center;gap:10px}
  .name{font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}
  .name .hex{font-size:10px;font-weight:500;color:var(--t3);font-family:ui-monospace,monospace}
  .dotc{width:11px;height:11px;border-radius:3px;background:var(--acc)}

  .panel{position:relative;background:#000;border-radius:0 0 20px 20px;width:100%;
    box-shadow:0 18px 44px rgba(0,0,0,.6),inset 0 0 0 .5px rgba(255,255,255,.06);padding:13px}
  .panel::before,.panel::after{content:"";position:absolute;top:0;width:11px;height:11px;background:#000}
  .panel::before{left:-11px;-webkit-mask:radial-gradient(11px at 0 11px,transparent 98%,#000)}
  .panel::after{right:-11px;-webkit-mask:radial-gradient(11px at 11px 11px,transparent 98%,#000)}

  .quad{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .cell{padding:10px}
  .cell.tl,.cell.tr{border-bottom:.5px solid var(--hair)}
  .cell.tl,.cell.bl{border-right:.5px solid var(--hair)}
  .ch{font-size:8px;font-weight:700;letter-spacing:.6px;color:var(--t3);margin-bottom:7px;display:flex;justify-content:space-between}

  .art{width:42px;height:42px;border-radius:9px;background:linear-gradient(135deg,#e8a07a,#b56a8f 55%,#6a4f8f);flex:none}
  .title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .artist{font-size:10px;font-weight:600;color:var(--acc)}
  .bar{height:3.5px;border-radius:2px;background:rgba(255,255,255,.16);position:relative;margin-top:7px}
  .bar>i{position:absolute;inset:0 56% 0 0;border-radius:2px;background:var(--acc)}

  .week{display:flex;margin-bottom:5px}.day{flex:1;text-align:center;font-size:8px;color:var(--t3)}
  .day .n{font-size:11px;color:var(--t2);font-weight:600;display:block}
  .day.t .n{background:var(--acc);color:#0a0a0a;border-radius:50%;width:18px;height:18px;line-height:18px;margin:1px auto 0;font-weight:700}
  .ev{display:flex;gap:6px;margin-top:5px}.ev .tick{width:2.5px;border-radius:2px;background:var(--acc);align-self:stretch}
  .ev .et{font-size:10px;font-weight:600}.ev .es{font-size:9px;color:var(--t3)}

  .perm{background:rgba(255,159,10,.12);border:1px solid rgba(255,159,10,.4);border-radius:8px;padding:6px 7px;display:flex;flex-direction:column;gap:5px}
  .ph{font-size:9px;font-weight:600;color:#ffd9a3}
  .pb{display:flex;gap:5px}.btn{font-size:9px;font-weight:600;border-radius:5px;padding:3px 9px}
  .btn.allow{background:var(--acc);color:#0a0a0a}.btn.deny{background:rgba(255,255,255,.1);color:#fff}
  .arow{display:flex;align-items:center;gap:6px;font-size:10px;margin-top:6px}
  .st{width:6px;height:6px;border-radius:50%;flex:none}
  .st.run{background:var(--green)}.st.done{background:rgba(255,255,255,.4)}
  .nm{color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}

  .chip{font-size:9px;color:var(--t2);background:rgba(255,255,255,.07);border-radius:14px;padding:2px 8px}
  .chip.on{background:var(--acc);color:#0a0a0a;font-weight:600}
  .capin{display:flex;gap:6px;align-items:center;margin-top:7px}
  .field{flex:1;background:rgba(255,255,255,.07);border-radius:7px;padding:5px 8px;font-size:10px;color:var(--t3)}
  .send{width:21px;height:21px;border-radius:50%;background:var(--acc);color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-size:11px;flex:none;font-weight:700}

  /* collapsed mini */
  .barbar{display:inline-flex;margin-bottom:2px}
  .slot{background:#000;display:flex;align-items:center;gap:5px;padding:4px 8px;font-size:9px;font-weight:600}
  .slot.l{border-radius:0 0 0 8px}.slot.r{border-radius:0 0 8px 0}
  .cam{width:64px;background:#000;border-radius:0 0 10px 10px;position:relative}
  .cam .lens{position:absolute;top:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#0c0c0c;box-shadow:inset 0 0 0 1px #2a2a2a}
  .gdot{width:5px;height:5px;border-radius:50%;background:var(--green)}
  .wv{color:var(--acc);font-size:8px}
  .sq{width:7px;height:7px;border-radius:2px}.sq.run{background:var(--green)}.sq.wait{background:var(--orange)}.sq.idle{background:rgba(255,255,255,.22)}

  .note{max-width:760px;margin:46px auto 0;font-size:12px;color:var(--t3);line-height:1.7}
  .note b{color:var(--t2)}
</style>
</head>
<body>
  <h1>Helm Notch · 配色方案对比</h1>
  <div class="sub"><b>黑底不变</b>(刘海本来就是黑的,最融合)。<b>状态色(绿运行/橙等待/红失败)保持语义不动</b>。主题色只用在:艺术家行 · 进度条 · 今日 · 选中胶囊 · 发送钮 · 折叠态波形。下面 8 个统一强调色方案 + 最后 1 个多色语义方案。</div>

  <div class="gridwrap" id="grid"></div>

  <div class="note" id="multinote"></div>

<script>
  const schemes = [
    ["Peach 暖橙(当前)","#FB9E66"],
    ["Coral 珊瑚","#FF6F61"],
    ["Amber 琥珀","#FFC53D"],
    ["Lime 酸橙","#B6E84F"],
    ["Mint 薄荷青","#34D6C0"],
    ["Sky 天蓝","#5EA0FF"],
    ["Violet 紫","#B98CFF"],
    ["Rose 玫红","#FF6FA5"],
  ];

  function panelHTML(){
    return `
    <div class="barbar">
      <div class="slot l"><span class="gdot"></span><span class="wv">▮▮▯</span></div>
      <div class="cam"><span class="lens"></span></div>
      <div class="slot r"><span class="sq run"></span><span class="sq wait"></span><span class="sq idle"></span></div>
    </div>
    <div class="panel">
      <div class="quad">
        <div class="cell tl">
          <div class="ch"><span>♪ 媒体</span></div>
          <div style="display:flex;gap:8px"><div class="art"></div>
            <div style="min-width:0;flex:1"><div class="title">Snow Painting…</div><div class="artist">Brilliant Supervision</div></div></div>
          <div class="bar"><i></i></div>
        </div>
        <div class="cell tr">
          <div class="ch"><span>📅 日历</span><span>JUN</span></div>
          <div class="week">
            <div class="day">F<span class="n">26</span></div><div class="day">S<span class="n">27</span></div>
            <div class="day t">S<span class="n">28</span></div><div class="day">M<span class="n">29</span></div><div class="day">T<span class="n">30</span></div></div>
          <div class="ev"><div class="tick"></div><div><div class="et">站会</div><div class="es">10:00</div></div></div>
        </div>
        <div class="cell bl">
          <div class="ch"><span>◉ AGENT</span><span style="color:var(--orange)">1 待批准</span></div>
          <div class="perm"><div class="ph">⚠︎ ~/helm/notch</div>
            <div class="pb"><span class="btn allow">允许</span><span class="btn deny">拒绝</span></div></div>
          <div class="arow"><span class="st run"></span><span class="nm">接日历 API</span></div>
        </div>
        <div class="cell br">
          <div class="ch"><span>✎ 速记</span></div>
          <div style="display:flex;gap:5px"><span class="chip on">速记</span><span class="chip">日记</span><span class="chip">任务</span></div>
          <div class="capin"><div class="field">随手记一笔…</div><div class="send">↑</div></div>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('grid').innerHTML = schemes.map(([name,hex])=>`
    <div class="scheme" style="--acc:${hex}">
      <div class="name"><span class="dotc"></span>${name} <span class="hex">${hex}</span></div>
      ${panelHTML()}
    </div>`).join('');

  // multi-color semantic scheme appended
  document.getElementById('grid').insertAdjacentHTML('beforeend', `
    <div class="scheme">
      <div class="name">🌈 多色语义 <span class="hex">每模块一色</span></div>
      <div class="barbar">
        <div class="slot l"><span class="gdot"></span><span class="wv" style="color:#FB9E66">▮▮▯</span></div>
        <div class="cam"><span class="lens"></span></div>
        <div class="slot r"><span class="sq run"></span><span class="sq wait"></span><span class="sq idle"></span></div>
      </div>
      <div class="panel">
        <div class="quad">
          <div class="cell tl" style="--acc:#FB9E66">
            <div class="ch"><span style="color:#FB9E66">♪ 媒体</span></div>
            <div style="display:flex;gap:8px"><div class="art"></div>
              <div style="min-width:0;flex:1"><div class="title">Snow Painting…</div><div class="artist">Brilliant Supervision</div></div></div>
            <div class="bar"><i></i></div>
          </div>
          <div class="cell tr" style="--acc:#5EA0FF">
            <div class="ch"><span style="color:#5EA0FF">📅 日历</span><span>JUN</span></div>
            <div class="week">
              <div class="day">F<span class="n">26</span></div><div class="day">S<span class="n">27</span></div>
              <div class="day t">S<span class="n">28</span></div><div class="day">M<span class="n">29</span></div><div class="day">T<span class="n">30</span></div></div>
            <div class="ev"><div class="tick"></div><div><div class="et">站会</div><div class="es">10:00</div></div></div>
          </div>
          <div class="cell bl" style="--acc:#34D6C0">
            <div class="ch"><span style="color:#34D6C0">◉ AGENT</span><span style="color:var(--orange)">1 待批准</span></div>
            <div class="perm"><div class="ph">⚠︎ ~/helm/notch</div>
              <div class="pb"><span class="btn allow">允许</span><span class="btn deny">拒绝</span></div></div>
            <div class="arow"><span class="st run"></span><span class="nm">接日历 API</span></div>
          </div>
          <div class="cell br" style="--acc:#B98CFF">
            <div class="ch"><span style="color:#B98CFF">✎ 速记</span></div>
            <div style="display:flex;gap:5px"><span class="chip on">速记</span><span class="chip">日记</span><span class="chip">任务</span></div>
            <div class="capin"><div class="field">随手记一笔…</div><div class="send">↑</div></div>
          </div>
        </div>
      </div>
    </div>`);

  document.getElementById('multinote').innerHTML = `
    <b>说明:</b> 前 8 个是「统一强调色」——整个面板一个主题色,克制、统一。
    最后 1 个「多色语义」给每个模块一个专属色(媒体橙 / 日历蓝 / agent 青 / 速记紫),识别性强但更花。<br>
    我个人觉得在黑底刘海上,<b>Peach / Amber / Mint / Sky</b> 质感最好;Lime/Rose 更个性。
    选一个(或说「主体用 X,但某处想换成 Y」),也可以让我把你选的那个铺到完整 2×2 大图再看。`;
</script>
</body>
</html>
