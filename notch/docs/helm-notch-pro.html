<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helm Notch Pro — 多模块刘海中枢(交互原型)</title>
<!--
============================================================================
 设计说明(把设计稿放进 HTML)
============================================================================
 在 layout-AD.html(2×2 原型)基础上,升级成 MacNotch 式「多模块刘海中枢」。
 折叠态:贴刘海一条黑,左=媒体(封面+均衡器),右=状态字形(✻运行/琥珀等权限/无则今日下个日程)。
 hover 展开:顶部模块 dock 切换 8 个模块。每日强调色自动轮换(palette[dayIndex%10])。

 模块:
 1) Dashboard — 不对称 bento:大媒体卡(可点开)+ 日历卡 + agent 卡 + 速记快捷条。不再四等分。
 2) Media — 点封面放大:封面模糊铺背景 + 歌词滚动(高亮当前句)+ 可拖进度 + 控制。
 3) 速记 — kind tab(速记/日记/任务)+ 大输入 + 最近记录列表;发送进 Helm /api/notes|tasks。
 4) Calendar — 独立:周条 + 今日事件列 + 加事件;接 Helm /api/calendar。
 5) Files — 真拖拽文件到刘海 → Shelf 暂存 → 上传到 Helm(记录)/ 关联 Cockpit / 移除。
 6) Agents — 本机 Claude Code 监听:session 列表 + 权限横幅(diff+Allow/Deny)+ 提问横幅。
 7) Clipboard — 剪贴板历史:最近复制项,点→重新复制 / 存为速记。
 8) Focus — 番茄钟:25:00 计时,start/pause/reset,关联当前任务。
 (+ Quick Ask:速记 tab 里「问大脑」直接问 Helm。)

 交互:dock 点击切模块;媒体点封面切歌词态;文件拖入/拖出;速记打字;番茄计时;日历加事件。
 配色:黑底,每日强调色,状态色(绿/橙/红)语义固定。
============================================================================
-->
<style>
  :root{
    --accent:#FFC53D;
    --green:#34C759;--orange:#FF9F0A;--cyan:#34D6C0;--blue:#0A84FF;--red:#FF453A;--purple:#7B61FF;
    --t1:#fff;--t2:rgba(255,255,255,.56);--t3:rgba(255,255,255,.34);--hair:rgba(255,255,255,.09);
    --tile:#1a1a1c;--tile2:#262628;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Rounded","Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;color:var(--t1);overflow-x:hidden;
    background:linear-gradient(135deg,#3a2f52,#1c2840 50%,#0e1a22),radial-gradient(900px 500px at 70% 30%,rgba(255,180,120,.16),transparent)}
  .menubar{position:fixed;top:0;left:0;right:0;height:26px;display:flex;align-items:center;gap:16px;padding:0 14px;font-size:13px;color:#fff;z-index:2}
  .menubar .ml{display:flex;gap:16px;font-weight:600}.menubar .mr{margin-left:auto;display:flex;gap:13px;font-size:12px;opacity:.9}
  .hint{position:fixed;bottom:22px;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,.55);line-height:1.7}
  .hint b{color:#fff}

  /* ===== notch ===== */
  .stage{position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:10}
  .notch{position:relative;background:#000;overflow:hidden;color:#fff;
    width:var(--cw,360px);height:var(--ch,30px);border-radius:0 0 16px 16px;
    box-shadow:0 18px 50px rgba(0,0,0,.55);
    transition:width .46s cubic-bezier(.32,.72,0,1),height .46s cubic-bezier(.32,.72,0,1),border-radius .4s}
  .notch.open{width:var(--ew,700px);height:var(--eh,244px);border-radius:0 0 26px 26px}
  .notch.banner{width:620px;height:208px;border-radius:0 0 26px 26px}
  .notch.remind{width:560px;height:152px;border-radius:0 0 26px 26px}
  .notch.drag{outline:2px dashed rgba(255,197,61,.7);outline-offset:-6px}
  .notch::before,.notch::after{content:"";position:absolute;top:0;width:13px;height:13px;background:#000;pointer-events:none}
  .notch::before{left:-13px;-webkit-mask:radial-gradient(13px at 0 13px,transparent 98%,#000)}
  .notch::after{right:-13px;-webkit-mask:radial-gradient(13px at 13px 13px,transparent 98%,#000)}

  /* collapsed */
  #bar{position:absolute;top:0;left:0;right:0;height:30px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;transition:opacity .14s;z-index:4}
  .notch.open #bar,.notch.banner #bar{opacity:0;pointer-events:none}
  .cl{justify-self:end;display:flex;align-items:center;gap:7px;padding-right:14px}
  .cc{width:160px;height:30px;position:relative}.cc .lens{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:#0c0c0c;box-shadow:inset 0 0 0 1px #2c2c2c}
  .cr{justify-self:start;display:flex;align-items:center;gap:6px;padding-left:14px}
  .mart{width:16px;height:16px;border-radius:5px;background:linear-gradient(135deg,#e8a07a,#b56a8f 55%,#6a4f8f)}
  .eqp{display:inline-flex;align-items:flex-end;gap:2px;height:11px}.eqp i{width:2px;border-radius:1px;background:var(--accent);animation:eq .9s ease-in-out infinite}
  .eqp i:nth-child(2){animation-delay:-.3s}.eqp i:nth-child(3){animation-delay:-.55s}.eqp i:nth-child(4){animation-delay:-.15s}
  @keyframes eq{0%,100%{height:3px}50%{height:11px}}
  .cnp{font-size:10px;color:var(--t2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cstar{color:var(--accent);font-size:12px;animation:cspin 1.1s ease-in-out infinite;display:inline-block}
  @keyframes cspin{0%{transform:rotate(0) scale(.85);opacity:.6}50%{transform:rotate(180deg) scale(1.12);opacity:1}100%{transform:rotate(360deg) scale(.85);opacity:.6}}
  .cct{font-size:11px;font-weight:700}
  .cev{font-size:10px;color:var(--t2)}.cev b{color:var(--accent)}

  /* panel + dock */
  #panel{position:absolute;inset:0;opacity:0;transform:translateY(-8px);transition:opacity .3s,transform .42s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
  .notch.open #panel,.notch.banner #panel{opacity:1;transform:translateY(0);transition:opacity .34s ease .12s,transform .46s cubic-bezier(.32,.72,0,1) .1s}
  .notch.banner #dock{display:none}
  .view{flex:1;min-height:0;overflow:hidden;padding:14px 16px}
  .dock{display:flex;align-items:center;justify-content:center;gap:9px;padding:8px 6px 9px;border-top:.5px solid var(--hair)}
  .dk{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);cursor:pointer;position:relative;background:#1a1a1c;box-shadow:0 2px 6px rgba(0,0,0,.4);transition:.12s}
  .dk:hover{background:#252527;color:#fff}
  .dk.on{background:#2c2c2e;color:var(--accent);box-shadow:0 0 0 1.5px var(--accent)}
  .dk .bdg{position:absolute;top:0;right:1px;width:9px;height:9px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 2px #000}
  .vh{font-size:9px;font-weight:700;letter-spacing:.6px;color:var(--t3);margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}

  /* ===== Dev category (vertical paging + small centered rail) ===== */
  .devwrap{display:flex;gap:6px;height:100%}
  .devstage{flex:1;min-width:0;position:relative;overflow:hidden}
  .devpage{height:100%}
  /* small centered sub-category rail (position indicator) */
  .devrail{flex:none;width:34px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:15px}
  .dri{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;
    opacity:.32;transform:scale(.8);transform-origin:center;transition:opacity .24s,transform .26s cubic-bezier(.32,.72,0,1)}
  .dri .ico{font-size:14px;color:var(--t2);transition:color .24s}
  .dri .lab{font-size:7px;font-weight:700;letter-spacing:.3px;color:var(--t3);transition:color .24s;white-space:nowrap}
  .dri.on{opacity:1;transform:scale(1.16)}
  .dri.on .ico{color:var(--accent)}
  .dri.on .lab{color:#fff}

  /* ===== Dashboard bento ===== */
  .bento{display:grid;grid-template-columns:1.5fr 1fr;grid-template-rows:1fr 1fr;gap:10px;height:100%}
  .card{background:rgba(255,255,255,.04);border:.5px solid var(--hair);border-radius:14px;padding:11px 13px;overflow:hidden;cursor:pointer;transition:.12s}
  .card:hover{background:rgba(255,255,255,.07)}
  .card.media{grid-row:span 2;position:relative;display:flex;flex-direction:column;justify-content:flex-end}
  .card.media .cov{position:absolute;inset:0;background:linear-gradient(135deg,#e8a07a,#b56a8f 55%,#6a4f8f);opacity:.5;filter:blur(2px)}
  .card.media .cov::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.85),transparent 70%)}
  .card.media .mc{position:relative;z-index:1}
  .ct{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--t3);margin-bottom:7px}
  .mt-title{font-size:15px;font-weight:700}.mt-artist{font-size:11px;color:rgba(255,255,255,.7)}
  .mini-bar{height:3px;border-radius:2px;background:rgba(255,255,255,.25);position:relative;margin-top:8px}.mini-bar i{position:absolute;inset:0 58% 0 0;border-radius:2px;background:#fff}
  .dcal .day{font-size:20px;font-weight:800}.dcal .ev{font-size:10px;color:var(--t2);margin-top:5px;display:flex;gap:5px;align-items:center}.dcal .ev .d{width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .dag .row{display:flex;align-items:center;gap:6px;font-size:10px;margin-top:5px}.dag .row .pd{width:6px;height:6px;border-radius:50%;background:var(--green)}

  /* ===== Dashboard (MacNotch-style widget row) ===== */
  .dashrow{display:flex;height:100%;align-items:stretch}
  .dwid{flex:1;padding:2px 16px;border-right:1px solid var(--hair);min-width:0;display:flex;flex-direction:column}
  .dwid:first-child{padding-left:2px}.dwid:last-child{border-right:none;padding-right:2px}
  .dwh{font-size:9px;font-weight:700;letter-spacing:.6px;color:var(--t3);margin-bottom:12px;white-space:nowrap}
  .tgs{display:flex;gap:7px;flex-wrap:wrap}
  .tg2{width:40px;height:40px;border-radius:12px;background:var(--tile2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);cursor:pointer}
  .tg2.on{background:#3a3a3d;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .todayrow{display:flex;gap:13px;align-items:center}
  .donut2{width:54px;height:54px;border-radius:50%;flex:none;position:relative;background:conic-gradient(var(--accent) 27%,rgba(255,255,255,.12) 0)}
  .donut2::after{content:"";position:absolute;inset:8px;border-radius:50%;background:#000}
  .donut2 span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:1}
  .tlist{font-size:11px;display:flex;flex-direction:column;gap:6px}
  .tlist .tr{display:flex;align-items:center;gap:6px;white-space:nowrap;color:var(--t2)}.tlist .tr .d{width:6px;height:6px;border-radius:50%;flex:none}
  .npm{display:flex;gap:10px;align-items:center}
  .npcov{width:44px;height:44px;border-radius:9px;background:linear-gradient(135deg,#1db954,#0a7f3a);flex:none}
  .npt{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.npa{font-size:10px;color:var(--t2)}
  .npbar{height:3px;border-radius:2px;background:rgba(255,255,255,.2);position:relative;margin-top:8px}.npbar i{position:absolute;inset:0 56% 0 0;background:var(--accent);border-radius:2px}
  .agr{display:flex;align-items:center;gap:7px;font-size:11px;margin-top:7px}
  .agr .pd{width:7px;height:7px;border-radius:50%;flex:none}
  /* media-left bigger + single-row toggles */
  .dwid.wmedia{flex:1.6}.dwid.wquick{flex:.8}
  .npbig{display:flex;gap:12px;align-items:center}
  .npcov2{width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,#1db954,#0a7f3a);flex:none;box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .npmeta{min-width:0;flex:1}
  .npctrl{display:flex;gap:16px;font-size:13px;margin-top:9px;color:#fff}.npctrl span{cursor:pointer}
  .tgs1{display:flex;gap:7px}
  .tg1{width:34px;height:34px;border-radius:11px;background:var(--tile2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);cursor:pointer}
  .tg1.on{background:#3a3a3d;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}

  /* capture attachments */
  .attrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .attchip{position:relative;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.06);border:.5px solid var(--hair);border-radius:10px;padding:5px 10px 5px 5px;max-width:180px}
  .attchip .x{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .attchip .ath{width:26px;height:26px;border-radius:6px;background-size:cover;flex:none}
  .attchip .abadge{width:26px;height:26px;border-radius:6px;background:var(--tile);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--t2);flex:none}
  .attchip .anm{font-size:11px;color:#e6e6ea;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ===== Stats 数据看板 ===== */
  .stats{display:flex;gap:18px;height:100%}
  .stcol.heat{flex:1.45;min-width:0;display:flex;flex-direction:column}
  .hmap{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;grid-auto-columns:1fr;gap:3px;flex:1;margin-top:4px;min-height:0}
  .hmap i,.hleg i{background:var(--accent);border-radius:2px}
  .l0{opacity:.09}.l1{opacity:.3}.l2{opacity:.52}.l3{opacity:.74}.l4{opacity:1}
  .hleg{font-size:9px;color:var(--t3);display:flex;align-items:center;gap:3px;margin-top:8px}.hleg i{width:9px;height:9px}
  .stcol.tiles{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
  .sttile{background:rgba(255,255,255,.04);border:.5px solid var(--hair);border-radius:12px;padding:10px 13px}
  .sl{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--t3)}
  .sv{font-size:24px;font-weight:800;margin-top:3px}.sv small{font-size:13px;color:var(--t2)}
  .spark{display:flex;align-items:flex-end;gap:3px;height:24px;margin-top:8px}.spark i{flex:1;border-radius:2px;background:var(--accent);opacity:.85}
  .sttile2{display:flex;gap:10px}
  .mini{flex:1;background:rgba(255,255,255,.04);border:.5px solid var(--hair);border-radius:12px;padding:10px 12px}
  .sv2{font-size:18px;font-weight:800;margin-top:4px}.sv2 small{font-size:11px;color:var(--t2);font-weight:600}

  /* ===== Media full ===== */
  .mfull{position:relative;height:100%;border-radius:10px;overflow:hidden;display:flex;flex-direction:column;padding:9px 16px 9px}
  .mback{position:relative;z-index:1;font-size:12px;color:var(--t2);font-weight:600;cursor:pointer;margin-bottom:3px}
  .mrow{position:relative;z-index:1;display:flex;gap:22px;flex:1;min-height:0}
  .mleft{flex:none;width:190px;display:flex;flex-direction:column;justify-content:center}
  .mtitle3{font-size:14px;font-weight:800;margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .martist3{font-size:11px;color:rgba(255,255,255,.7)}
  .mbar2{height:4px;border-radius:3px;background:rgba(255,255,255,.22);position:relative;margin:9px 0 3px;cursor:pointer}
  .mbar2 i{position:absolute;inset:0 58% 0 0;border-radius:3px;background:#fff}
  .mbar2 b{position:absolute;left:42%;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.4)}
  .mtt3{display:flex;justify-content:space-between;font-size:9px;color:rgba(255,255,255,.55)}
  .mctrl2{display:flex;align-items:center;gap:22px;font-size:15px;margin-top:8px}.mctrl2 .pp{font-size:21px}.mctrl2 span{cursor:pointer}
  .lyrics{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;justify-content:center;gap:7px;
    -webkit-mask:linear-gradient(180deg,transparent,#000 22%,#000 78%,transparent);mask:linear-gradient(180deg,transparent,#000 22%,#000 78%,transparent)}
  .lyrics .ln{font-size:13px;color:rgba(255,255,255,.38);text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.3s}
  .lyrics .ln.cur{color:#fff;font-weight:700;font-size:14px}
  .ports .prow{display:flex;align-items:center;gap:11px;font-size:12px;padding:7px 0;border-bottom:.5px solid var(--hair)}
  .ports .pd2{width:7px;height:7px;border-radius:50%;flex:none}
  .ports .pp2{font-family:ui-monospace,monospace;font-weight:700;color:#fff;min-width:56px}
  .ports .pn2{color:var(--t2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ports .pgo{font-size:10px;color:var(--accent);cursor:pointer}
  .mfull .bgcov{position:absolute;inset:0;background:linear-gradient(135deg,#e8a07a,#b56a8f 55%,#6a4f8f);filter:blur(34px) saturate(1.4);transform:scale(1.3);opacity:.6}
  .mfull .bgcov::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.45)}
  .mfull>*{position:relative;z-index:1}
  .bigcov{width:84px;height:84px;border-radius:14px;background:linear-gradient(135deg,#1db954,#0a7f3a);box-shadow:0 10px 30px rgba(0,0,0,.5);flex:none;transition:.2s}
  /* media waveform visualizer (monochrome, daily --accent) */
  .mwave{position:relative;z-index:1;display:flex;align-items:flex-end;gap:3px;height:24px;margin-top:7px;
    -webkit-mask:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);mask:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent)}
  .mwave i{flex:1;border-radius:2px;background:var(--accent);opacity:.5;transform-origin:bottom;animation:wave 1.1s ease-in-out infinite}
  @keyframes wave{0%,100%{transform:scaleY(.32)}50%{transform:scaleY(1)}}

  /* ===== Calendar reminder banner ===== */
  .rmd{display:flex;align-items:center;gap:17px;height:100%;padding:4px 22px}
  .rmd-l{flex:none}
  .rmd-cal{width:56px;height:56px;border-radius:15px;background:rgba(255,255,255,.05);border:.5px solid var(--hair);display:flex;align-items:center;justify-content:center;color:var(--accent)}
  .rmd-m{flex:1;min-width:0}
  .rmd-top{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--t2);display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .rmd-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(255,255,255,.08)}
  .rmd-t{font-size:18px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rmd-meta{font-size:12px;color:var(--t2);margin-top:3px;font-variant-numeric:tabular-nums}
  .rmd-loc{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:5px;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rmd-loc svg{flex:none;color:var(--t3)}
  .rmd-a{flex:none;display:flex;flex-direction:column;align-items:stretch;gap:8px;width:132px}
  .rmd-join{text-align:center;background:var(--accent);color:#1a1208;font-weight:700;font-size:13px;border-radius:10px;padding:10px;cursor:pointer}
  .rmd-sub{display:flex;gap:8px}
  .rmd-b{flex:1;text-align:center;background:rgba(255,255,255,.1);border-radius:9px;padding:7px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer}
  .rmd-b:hover{background:rgba(255,255,255,.16);color:#fff}

  /* ===== Capture ===== */
  .cap{display:flex;flex-direction:column;height:100%}
  .chips{display:flex;gap:7px;margin-bottom:11px}
  .chip{font-size:12px;color:var(--t2);background:rgba(255,255,255,.07);border-radius:18px;padding:5px 14px;cursor:pointer}
  .chip.on{background:var(--accent);color:#1a1208;font-weight:600}
  .capin{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;font-size:14px;flex:none;min-height:74px;cursor:text;outline:none;line-height:1.5}
  .capin.on{box-shadow:0 0 0 1.5px rgba(255,197,61,.5)}.capin .ph{color:var(--t3)}
  .caret{display:inline-block;width:2px;height:16px;background:var(--accent);vertical-align:-3px;animation:bl 1s steps(1) infinite}@keyframes bl{50%{opacity:0}}

               : '⏎ 发送 · 拖文件进来可一起归档到 Helm';
    return `<div class="cap"><div class="vh"><span>速记 → Helm</span>${S.capLock?'<span style="color:var(--accent)">● 输入中</span>':''}</div>
    <div class="chips">${['note','journal','task','ask'].map(k=>`<span class="chip${S.kind===k?' on':''}" data-k="${k}">${({note:'速记',journal:'日记',task:'任务',ask:'问大脑'})[k]}</span>`).join('')}</div>
    <div class="capin${S.capLock?' on':''}" data-act="focus">${S.captext?S.captext+(S.capLock?'<span class="caret"></span>':''):(S.capLock?'<span class="caret"></span>':`<span class="ph">${att?'给这些文件写点备注…':ph()}</span>`)}</div>
    ${att?`<div class="attrow">${S.files.map((f,i)=>fileChip(f,i)).join('')}</div>`:''}
    <div class="caprow"><span class="hintc">${hint}</span><span class="sendb" data-act="send">${att?'发送并归档':(S.kind==='ask'?'问':'发送')}</span></div>
    ${att?'':`<div class="recent"><div class="rt">最近</div>${RECENT.map(r=>`<div class="r"><span class="k">${r.k}</span><span class="x">${r.x}</span><span class="tm">${r.tm}</span></div>`).join('')}</div>`}
  </div>`;},

  cal:()=>{
    const t=new Date(),off=S.calOff||0;
    const vd=new Date(t.getFullYear(),t.getMonth()+off,1),Y=vd.getFullYear(),M=vd.getMonth();
    const mname=vd.toLocaleString('en',{month:'long'});
    const WL=['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const same=(a,b)=>a.toDateString()===b.toDateString();
    let left;
    if(S.calExpand){  // 放大:整月网格
      const start=new Date(Y,M,1);start.setDate(1-start.getDay());let cells='';
      for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);
        const out=d.getMonth()!==M,we=(d.getDay()===0||d.getDay()===6),tod=same(d,t),has=!out&&CAL_EVDAYS.includes(d.getDate());
        cells+=`<div class="mcell${out?' out':''}${we&&!out?' we':''}${tod?' tod':''}"><span>${d.getDate()}</span>${has?'<span class="mev"></span>':''}</div>`;}
      left=`<div class="mgrid"><div class="mgh">${WL.map((w,i)=>`<span class="${i===0||i===6?'we':''}">${w}</span>`).join('')}</div><div class="mgb">${cells}</div></div>`;
    }else{  // 缩小:本周条
      const base=off===0?new Date(t):new Date(Y,M,1);const ws=new Date(base);ws.setDate(base.getDate()-base.getDay());let cols='';
      for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);
        const we=(d.getDay()===0||d.getDay()===6),tod=same(d,t),has=d.getMonth()===M&&CAL_EVDAYS.includes(d.getDate());
        cols+=`<div class="wcol${tod?' tod':''}"><span class="wl${we?' we':''}">${WL[d.getDay()]}</span><span class="wnum">${d.getDate()}</span>${has?'<span class="wev"></span>':''}</div>`;}
      left=`<div class="wstrip"><div class="wbig"><div class="wm">${mname.slice(0,3)}</div><div class="wy">${Y}</div></div><div class="wdays">${cols}</div></div>`;
    }
    const agenda=EVENTS.slice(0,S.calExpand?EVENTS.length:3).map(ev=>`<div class="evr">
        <div class="evtime"><div class="s">${ev.s}</div><div class="e">${ev.e}</div></div>
        <div class="evbody"><div class="nm">${ev.t}</div><div class="lo">${PIN}<span>${ev.loc}</span></div></div>
        <span class="evdot" style="background:${ev.c}"></span></div>`).join('');
    return `<div class="calview">
      <div class="calhd2"><span class="cm">${mname}</span><span class="cy">${Y}</span><span class="sp"></span>
        ${off!==0?`<span class="cpill" data-act="caltoday">Today</span>`:''}
        <span class="cnav"><span data-act="calprev">‹</span><span data-act="calnext">›</span></span>
        <span class="cexp" data-act="calexp">${S.calExpand?'⤡':'⤢'}</span></div>
      <div class="calbody"><div class="calL">${left}</div><div class="calR"><div class="agenda">${agenda}</div></div></div>
    </div>`;},

  stats:()=>`<div class="stats">
    <div class="stcol heat">
      <div class="dwh">GITHUB · 1,284 contributions</div>
      <div class="hmap">${HEAT.map(l=>`<i class="l${l}"></i>`).join('')}</div>
      <div class="hleg">Less <i class="l1"></i><i class="l2"></i><i class="l3"></i><i class="l4"></i> More</div>
    </div>
    <div class="stcol tiles">
      <div class="sttile"><div class="sl">CLAUDE CODE TOKENS · TODAY</div>
        <div class="sv">2.4<small>M</small> <span style="font-size:11px;color:var(--t3);font-weight:600">· 48M 总</span></div>
        <div class="spark">${SPARK.map(h=>`<i style="height:${h}%"></i>`).join('')}</div></div>
      <div class="sttile2">
        <div class="mini"><div class="sl">COMMITS · 本周</div><div class="sv2">37</div></div>
        <div class="mini"><div class="sl">PULL REQUESTS</div><div class="sv2">3<small> open</small> · 12<small> merged</small></div></div>
      </div>
    </div>
  </div>`,

  dev:()=>`<div class="devwrap">
   <div class="devstage"><div class="devpage" id="devpage">${devPage(S.devSec)}</div></div>
   <div class="devrail" id="devrail">
     ${DEVSECS.map((r,k)=>`<div class="dri${k===S.devSec?' on':''}" data-sec="${k}"><span class="ico">${r.i}</span><span class="lab">${r.l}</span></div>`).join('')}
   </div>
  </div>`,

  agents:()=>{
    if(S.mode==='waiting'){
      return `<div class="vh"><span style="color:#ffd9a3">◉ 本机 CLAUDE CODE · 1 待批准</span></div>
      <div class="srow"><span class="pd wait"></span>notch<span class="think" style="margin-left:6px"><span class="st">✻</span></span><span class="stag w">待批准 ›</span></div>
      <div class="perm" style="margin-top:8px"><div class="ph">⚠︎ Edit src/auth/middleware.ts</div>
        <div class="diff"><div class="dl ctx"><span class="ln">12</span><span class="tx"> const verify = (token) =></span></div>
          <div class="dl del"><span class="ln">13</span><span class="tx">-  jwt.verify(token);</span></div>
          <div class="dl add"><span class="ln">13</span><span class="tx">+  if (!token) throw new</span></div></div>
        <div class="bbtns"><span class="bbtn deny" data-act="resolve">Deny ⌘N</span><span class="bbtn allow" data-act="resolve">Allow ⌘Y</span></div></div>`;
    }
    if(S.mode==='none') return `<div class="vh"><span>◉ 本机 CLAUDE CODE</span></div><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80%;gap:5px;color:var(--t2)"><div style="font-size:13px;font-weight:600;color:#fff">暂无运行中的 agent</div><div style="font-size:11px">开一个 Claude Code session 就会出现</div></div>`;
    return `<div class="vh"><span>◉ 本机 CLAUDE CODE</span><span>2 活跃</span></div>
      <div class="srow"><span class="pd run"></span>notch<span class="think" style="margin-left:6px"><span class="st">✻</span> <span class="shine">正在思考…</span></span><span class="stag">运行中 ›</span></div>
      <div class="srow"><span class="pd run"></span>app<span style="color:var(--t3);font-size:11px;margin-left:6px">Bash: swift build</span><span class="stag">运行中 ›</span></div>
      <div class="srow"><span class="pd done"></span>helm<span style="color:var(--t3);font-size:11px;margin-left:6px">~/helm</span><span class="stag">完成</span></div>`;
  },

  clip:()=>`<div class="clip"><div class="vh"><span>📋 CLIPBOARD 历史</span><span>点→复制 / 存速记</span></div>
    ${CLIP.map(c=>`<div class="r"><span class="ic">${c.ic}</span><span class="tx">${c.tx}</span><span class="tm">${c.tm}</span></div>`).join('')}</div>`,

  focus:()=>{const m=Math.floor(S.focusSec/60),s=S.focusSec%60;const p=Math.round((1-S.focusSec/(25*60))*100);
    return `<div class="focus"><div class="vh" style="position:absolute;top:14px;left:16px">FOCUS</div>
      <div class="ring" style="--p:${p}%"><span class="tm">${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</span></div>
      <div class="ftask">专注:重做刘海 Pro 原型</div>
      <div class="fctrl"><span class="fb go" data-act="ftoggle">${S.focusRunning?'暂停':'开始'}</span><span class="fb" data-act="freset">重置</span></div></div>`;},
};
function ph(){return {note:'随手记一笔…',journal:'今天发生了什么?',task:'到点让 agent 做什么…',ask:'问问 Helm 大脑…'}[S.kind];}
function devPage(i){return [V.agents,V.ports,V.stats][i]();}  // Dev 子分类各自整页(复用原布局)
function fileChip(f,i){
  const vis = f.url?`<span class="ath" style="background-image:url(${f.url})"></span>`:`<span class="abadge">${f.ext}</span>`;
  return `<div class="attchip"><span class="x" data-rm="${i}">×</span>${vis}<span class="anm">${f.name}</span></div>`;
}

function renderDock(){
  dock.innerHTML=MODULES.map(m=>{
    const bdg=(m.id==='dev'&&S.mode==='waiting');
    return `<div class="dk${S.view===m.id?' on':''}" data-mod="${m.id}" title="${m.name}">${m.icon}${bdg?'<span class="bdg"></span>':''}</div>`;
  }).join('');
}
function bannerHTML(){
  return `<div class="vh"><span style="color:#ffd9a3">● Permission Request · notch</span><span style="color:var(--t3)">⌘Y 允许 · ⌘N 拒绝</span></div>
    <div class="perm" style="background:none;border:none;padding:0">
      <div class="ph">⚠︎ Edit · src/auth/middleware.ts</div>
      <div class="diff">
        <div class="dl ctx"><span class="ln">12</span><span class="tx"> const verify = (token) =></span></div>
        <div class="dl del"><span class="ln">13</span><span class="tx">-  jwt.verify(token);</span></div>
        <div class="dl add"><span class="ln">13</span><span class="tx">+  if (!token) throw new</span></div>
        <div class="dl add"><span class="ln">14</span><span class="tx">+    AuthError('missing');</span></div>
      </div>
      <div class="bbtns"><span class="bbtn deny" data-act="resolve">Deny ⌘N</span><span class="bbtn allow" data-act="resolve">Allow ⌘Y</span></div>
    </div>`;
}
function remindHTML(){
  const r=S.remind;
  return `<div class="rmd">
    <div class="rmd-l"><div class="rmd-cal">${CALSVG}</div></div>
    <div class="rmd-m">
      <div class="rmd-top"><span class="rmd-dot"></span>日程提醒 · 现在开始</div>
      <div class="rmd-t">${r.t}</div>
      <div class="rmd-meta">${r.s}–${r.e} · ${r.dur}</div>
      <div class="rmd-loc">${PIN}<span>${r.loc}</span></div>
    </div>
    <div class="rmd-a">
      ${r.join?`<span class="rmd-join" data-act="rmdjoin">加入</span>`:''}
      <div class="rmd-sub"><span class="rmd-b" data-act="rmdsnooze">稍后</span><span class="rmd-b" data-act="rmddismiss">忽略</span></div>
    </div>
  </div>`;
}
function viewHeight(){
  if(S.view==='dev') return DEVSECS[S.devSec].h;
  if(S.view==='cal') return S.calExpand?312:240;
  return VH[S.view];
}
function render(){
  const banner = S.mode==='waiting' || !!S.remind;
  notch.classList.toggle('banner',banner);
  notch.classList.toggle('remind',!!S.remind);  // 提醒 banner 有独立尺寸(更矮)
  notch.classList.toggle('open',S.open && !banner);
  if(!banner) notch.style.setProperty('--eh',(viewHeight()||236)+'px');  // 按模块/子分类/展开态自适应高度
  renderBar();
  view.innerHTML = banner ? (S.remind ? remindHTML() : bannerHTML()) : (V[S.view]||V.dash)();
  renderDock();
  syncCtl();
  bindDropzone();
  bindDev();
}
function syncCtl(){
  document.querySelectorAll('#ctl-mode .opt').forEach(o=>o.classList.toggle('on',o.dataset.mode===S.mode));
  document.querySelectorAll('#ctl-play .opt').forEach(o=>o.classList.toggle('on',o.dataset.play==String(S.play)));
  document.querySelectorAll('#ctl-remind .opt').forEach(o=>o.classList.toggle('on',o.dataset.remind===(S.remind?'1':'0')));
}

/* ---------- events ---------- */
notch.addEventListener('mouseenter',()=>{if(!S.open){S.open=true;render();}});
notch.addEventListener('mouseleave',()=>{if(S.mode==='waiting')return;if(S.open&&!S.capLock){S.open=false;render();}});
dock.addEventListener('click',e=>{const d=e.target.closest('.dk');if(d){S.view=d.dataset.mod;S.mediaLyrics=false;if(S.view==='dev')S.devSec=0;render();}});
view.addEventListener('click',e=>{
  if(e.target.closest('[data-stop]'))return;  // 媒体上一首/下一首:不触发进模块
  const rm=e.target.closest('[data-rm]');if(rm){S.files.splice(+rm.dataset.rm,1);render();return;}
  const k=e.target.closest('[data-k]');if(k){S.kind=k.dataset.k;render();return;}
  const act=e.target.closest('[data-act]');
  const go=e.target.closest('[data-go]');
  if(!act){if(go){const g=go.dataset.go;if(g==='media-flip'){S.mediaLyrics=!S.mediaLyrics;}else{S.view=g;if(g==='dev')S.devSec=0;}render();}return;}
  const a=act.dataset.act;
  if(a==='focus'){S.capLock=true;}
  else if(a==='send'){
    if(S.files.length){flash('已把 '+S.files.length+' 个文件 + 备注发给 Helm 归档(Journal / RAG)');S.files=[];}
    else flash(S.kind==='ask'?'已问 Helm 大脑':'已记录到 Helm');
    S.captext='';S.capLock=false;}
  else if(a==='pp'){S.play=S.play?0:1;}
  else if(a==='resolve'){S.mode='running';S.open=false;S.view='dash';}
  else if(a==='addev'){flash('（演示）打开「加事件」表单');}
  else if(a==='calexp'){S.calExpand=!S.calExpand;}
  else if(a==='caltoday'){S.calOff=0;}
  else if(a==='calprev'){S.calOff=(S.calOff||0)-1;}
  else if(a==='calnext'){S.calOff=(S.calOff||0)+1;}
  else if(a==='rmdjoin'){flash('已加入 · '+S.remind.t);S.remind=null;}
  else if(a==='rmdsnooze'){flash('已稍后提醒(5 分钟)');S.remind=null;}
  else if(a==='rmddismiss'){S.remind=null;}
  else if(a==='ftoggle'){S.focusRunning=!S.focusRunning;}
  else if(a==='freset'){S.focusRunning=false;S.focusSec=25*60;}
  render();
});
// 全局左右滑动 → 切换模块(触控板横扫 / 鼠标拖拽),带方向性滑入动画
let animating=false;
function switchModule(dir){
  if(!S.open||S.mode==='waiting'||animating)return;
  const ids=MODULES.map(m=>m.id);let i=ids.indexOf(S.view);if(i<0)i=0;
  const next=ids[(i+dir+ids.length)%ids.length];
  if(next===S.view)return;
  slideTo(next,dir);
}
function slideTo(next,dir){
  animating=true;
  // 旧内容朝滑动方向退出
  view.style.transition='transform .17s ease,opacity .17s ease';
  view.style.transform=`translateX(${dir>0?-46:46}px)`;view.style.opacity='0';
  setTimeout(()=>{
    S.view=next;S.mediaLyrics=false;if(next==='dev')S.devSec=0;render();
    // 新内容从反方向无动画就位,再滑入归零
    view.style.transition='none';
    view.style.transform=`translateX(${dir>0?46:-46}px)`;view.style.opacity='0';
    void view.offsetWidth;  // 强制重排,使下一段 transition 生效
    view.style.transition='transform .3s cubic-bezier(.32,.72,0,1),opacity .26s ease';
    view.style.transform='translateX(0)';view.style.opacity='1';
    setTimeout(()=>{animating=false;view.style.transition='';},310);
  },170);
}
notch.addEventListener('wheel',e=>{
  if(!S.open||S.mode==='waiting')return;
  const ax=Math.abs(e.deltaX),ay=Math.abs(e.deltaY);
  // Dev 页:纵扫切子分类(上下分页);其余:横扫切模块
  if(S.view==='dev'&&ay>ax&&ay>10){e.preventDefault();switchDev(e.deltaY>0?1:-1);return;}
  if(ax>ay&&ax>10){e.preventDefault();switchModule(e.deltaX>0?1:-1);}
},{passive:false});
let dragX=null,dragY=null;
notch.addEventListener('pointerdown',e=>{if(S.capLock||e.target.closest('.dk,[data-act],[data-go],[data-stop],[data-k],.dri'))return;dragX=e.clientX;dragY=e.clientY;});
notch.addEventListener('pointerup',e=>{if(dragX==null)return;const dx=e.clientX-dragX,dy=e.clientY-dragY;dragX=dragY=null;
  if(S.view==='dev'&&Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>45){switchDev(dy<0?1:-1);return;}
  if(Math.abs(dx)>55)switchModule(dx<0?1:-1);});
document.addEventListener('keydown',e=>{
  if(S.mode==='waiting'){const k=e.key.toLowerCase();if(k==='y'||k==='n'){S.mode='running';S.open=false;S.view='dash';render();}return;}
  if(!S.capLock)return;
  if(e.key==='Escape'||e.key==='Enter'){S.captext='';S.capLock=false;render();return;}
  if(e.key==='Backspace'){S.captext=S.captext.slice(0,-1);render();e.preventDefault();return;}
  if(e.key.length===1){S.captext+=e.key;render();}
});

/* ---------- Dev sub-category vertical paging ---------- */
function bindDev(){
  const rail=document.getElementById('devrail');if(!rail)return;
  rail.addEventListener('click',e=>{const d=e.target.closest('.dri');if(!d)return;
    const t=+d.dataset.sec;if(t!==S.devSec)slideDev(t,t>S.devSec?1:-1);});
}
function switchDev(dir){  // 上下分页:不循环,到顶/底停住
  if(animating)return;const n=DEVSECS.length;const next=S.devSec+dir;
  if(next<0||next>=n)return;slideDev(next,dir);
}
function slideDev(next,dir){
  const page=document.getElementById('devpage');if(!page||animating)return;
  animating=true;
  page.style.transition='transform .16s ease,opacity .16s ease';
  page.style.transform=`translateY(${dir>0?-34:34}px)`;page.style.opacity='0';
  notch.style.setProperty('--eh',DEVSECS[next].h+'px');  // 高度同步过渡
  setTimeout(()=>{
    S.devSec=next;page.innerHTML=devPage(next);
    document.querySelectorAll('#devrail .dri').forEach((it,i)=>it.classList.toggle('on',i===next));
    page.style.transition='none';
    page.style.transform=`translateY(${dir>0?34:-34}px)`;page.style.opacity='0';
    void page.offsetWidth;
    page.style.transition='transform .3s cubic-bezier(.32,.72,0,1),opacity .26s ease';
    page.style.transform='translateY(0)';page.style.opacity='1';
    setTimeout(()=>{animating=false;page.style.transition='';},310);
  },160);
}

/* ---------- real file drag-drop ---------- */
function bindDropzone(){
  const dz=document.getElementById('dz');if(!dz)return;
  dz.addEventListener('dragover',ev=>{ev.preventDefault();dz.classList.add('over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',ev=>{ev.preventDefault();dz.classList.remove('over');addFiles(ev.dataTransfer.files);});
}
// also accept drops anywhere on the notch (auto-switch to Files)
['dragover','drop','dragenter','dragleave'].forEach(t=>notch.addEventListener(t,e=>e.preventDefault()));
notch.addEventListener('dragenter',()=>{notch.classList.add('drag');if(!S.open){S.open=true;}S.view='cap';render();});
notch.addEventListener('dragleave',e=>{if(!notch.contains(e.relatedTarget))notch.classList.remove('drag');});
notch.addEventListener('drop',e=>{notch.classList.remove('drag');S.open=true;S.view='cap';addFiles(e.dataTransfer.files);});
function addFiles(list){
  [...list].forEach(f=>{const ext=(f.name.split('.').pop()||'FILE').toUpperCase().slice(0,4);
    const it={name:f.name,ext,url:null};
    if(f.type&&f.type.startsWith('image/'))it.url=URL.createObjectURL(f);
    S.files.push(it);});
  S.view='cap';render();
}

/* ---------- timers ---------- */
setInterval(()=>{ // focus countdown
  if(S.focusRunning&&S.focusSec>0){S.focusSec--;if(S.view==='focus')render();}
},1000);
setInterval(()=>{ // lyrics advance
  if(S.view==='media'&&S.play){lyricI=(lyricI+1)%LYRICS.length;render();}
},2600);

let flashEl;
function flash(msg){clearTimeout(flashEl);let f=document.getElementById('flash');if(!f){f=document.createElement('div');f.id='flash';
  f.style.cssText='position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:30;background:rgba(0,0,0,.85);color:#fff;font-size:12px;padding:9px 16px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.5)';document.body.appendChild(f);}
  f.textContent=msg;f.style.opacity='1';flashEl=setTimeout(()=>f.style.opacity='0',1800);}

document.querySelectorAll('#ctl-mode .opt').forEach(o=>o.onclick=()=>{S.mode=o.dataset.mode;render();});
document.querySelectorAll('#ctl-play .opt').forEach(o=>o.onclick=()=>{S.play=+o.dataset.play;render();});
document.querySelectorAll('#ctl-remind .opt').forEach(o=>o.onclick=()=>{S.remind=o.dataset.remind==='1'?REMINDER:null;render();});
S.open=true;render();
</script>
</body>
</html>
